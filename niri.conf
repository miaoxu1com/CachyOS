// 此配置文件使用 KDL 格式：https://kdl.dev
// "/-" 表示注释掉后续的节点。
// 完整配置说明请参考 wiki：
// https://yalter.github.io/niri/Configuration:-Introduction

// ========== 输入设备配置 ==========
// 详细选项参见：
// https://yalter.github.io/niri/Configuration:-Input

prefer-no-csd

input {
    keyboard {
    	xkb {
			layout "us,zh"
        } 
        numlock
    }

    mouse {
        // off
        // natural-scroll
        // accel-speed 0.2
        accel-profile "flat"
        // scroll-method "no-scroll"
    }

    warp-mouse-to-focus
    focus-follows-mouse max-scroll-amount="0%"
}

// ========== 输出（显示器）配置 ==========
// 可通过 `niri msg outputs` 查看输出名称。
output "HDMI-A-1" {
  Supere "1920x1080@60.000"
}

// ========== 布局（窗口排布）设置 ==========
// 详情参见：
// https://yalter.github.io/niri/Configuration:-Layout
layout {
    // background-color "00000020"   // 桌面背景色（半透明）

    gaps 0
    center-focused-column "never"

    // 自定义 `switch-preset-column-width` (Super+R) 切换的列宽预设
    preset-column-widths {
        proportion 0.33333
        proportion 0.5
        proportion 0.66667
    }

    // 自定义 `switch-preset-window-height` (Super+Shift+R) 切换的窗口高度预设
    // preset-window-heights { }

    // 新窗口的默认宽度
    default-column-width { proportion 0.5; }


    // 焦点环样式
    focus-ring {
        off          // 取消注释此行可禁用焦点环

        width 0      // 焦点环延伸出窗口的逻辑像素宽度

        active-color "#7fc8ff"     // 活动显示器上的焦点环颜色

        inactive-color "#505050"   // 非活动显示器上的焦点环颜色
    }

    // 边框设置（始终显示，类似焦点环但永久可见）
    border {
        width 2
        active-color "#7fc8ff"
        inactive-color "#505050"
        urgent-color "#9b0000"      // 请求注意的窗口边框颜色

    }


}

// ========== 概览（Overview）模式 ==========
overview {
    backdrop-color "#4c566a90"   // 概览背景色（半透明）
}

// ========== 图层规则（layer-shell） ==========
layer-rule {
    place-within-backdrop true   // 将图层置于壁纸背景内
}

// 更多 spawn 示例见下方 binds 部分。
spawn-at-startup "fcitx5"
spawn-at-startup "qs" "-c" "noctalia-shell"   // 启动您的 shell（如 noctalia-shell）


// ========== 快捷键覆盖提示 ==========
hotkey-overlay {
    skip-at-startup   // 取消注释可禁用启动时的“重要快捷键”弹窗
}

// 路径会经过 strftime(3) 格式化，包含日期时间
screenshot-path "~/Pictures/Screenshots/Screenshot from %Y-%m-%d %H-%M-%S.png"



// ========== 窗口规则 ==========


// 将 kitty 浮动窗口（通过 --class kitty-float 启动）设为浮动并居中
window-rule {
    match app-id="kitty-float"
    open-floating true
    default-column-width { proportion 0.5; }
    default-window-height { proportion 0.5; }
}

// Firefox 画中画窗口默认浮动
window-rule {
    // 该正则匹配 host 和 Flatpak 两种 Firefox
    match app-id=r#"brave orign$"# title="^Picture-in-Picture$"
    open-floating true
}



// 示例：为所有窗口启用圆角（已注释）
window-rule {
	geometry-corner-radius 5
	clip-to-geometry true
 }

// ========== 快捷键绑定 ==========
binds {

    // Super+Shift+/（通常即 Super+?）显示重要快捷键列表
    Ctrl+Slash { show-hotkey-overlay; }
    // ===== 常用应用启动 =====
    Ctrl+Shift+Return hotkey-overlay-title="Floating Terminal" {
        spawn-sh "kconsole --class kconsole-float";   // 浮动终端
    }
    Ctrl+Alt+T hotkey-overlay-title="启动终端" { spawn "kconsole"; }
    Ctrl+Space hotkey-overlay-title="打开App启动器" { spawn-sh "qs -c noctalia-shell ipc call launcher toggle"; }
    Ctrl+Alt+Escape hotkey-overlay-title="打开btop" { spawn-sh "kconsole fish -i -c btop"; }
    Ctrl+Alt+L hotkey-overlay-title="锁屏" { spawn-sh "qs -c noctalia-shell ipc call lockScreen lock"; }
    Ctrl+Alt+W hotkey-overlay-title="切换壁纸" { spawn-sh "qs -c noctalia-shell ipc call wallpaper toggle"; }
    Ctrl+Alt+Delete hotkey-overlay-title="显示会话菜单" { spawn-sh "qs -c noctalia-shell ipc call sessionMenu toggle"; }
    Ctrl+B hotkey-overlay-title="打开浏览器" { spawn "brave origin"; }
    Super+E hotkey-overlay-title="打开Yazi" { spawn-sh "kconsole fish -i -c yazi"; }
    Ctrl+Grave hotkey-overlay-title="显示剪贴板" { spawn "qs" "-c" "noctalia-shell" "ipc" "call" "launcher" "clipboard"; }
    // Audio controls
    XF86AudioRaiseVolume { spawn "qs" "-c" "noctalia-shell" "ipc" "call" "volume" "increase"; }
    XF86AudioLowerVolume { spawn "qs" "-c" "noctalia-shell" "ipc" "call" "volume" "decrease"; }
    XF86AudioMute { spawn "qs" "-c" "noctalia-shell" "ipc" "call" "volume" "muteOutput"; }

    // Brightness controls
    XF86MonBrightnessUp { spawn "qs" "-c" "noctalia-shell" "ipc" "call" "brightness" "increase"; }
    XF86MonBrightnessDown { spawn "qs" "-c" "noctalia-shell" "ipc" "call" "brightness" "decrease"; }
    
    
	// 关闭显示器（省电），任意输入（鼠标移动或按键）可唤醒
    Super+Shift+P { power-off-monitors; }
    // ===== 音频控制（PipeWire + WirePlumber） =====
    // XF86AudioRaiseVolume allow-when-locked=true { spawn-sh "wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0"; }
    // XF86AudioLowerVolume allow-when-locked=true { spawn-sh "wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-"; }
    // XF86AudioMute        allow-when-locked=true { spawn-sh "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"; }
    // XF86AudioMicMute     allow-when-locked=true { spawn-sh "wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle"; }

    // ===== 媒体控制（MPRIS 播放器） =====
    // XF86AudioPlay        allow-when-locked=true { spawn-sh "playerctl play-pause"; }
    // XF86AudioStop        allow-when-locked=true { spawn-sh "playerctl stop"; }
    // XF86AudioPrev        allow-when-locked=true { spawn-sh "playerctl previous"; }
    // XF86AudioNext        allow-when-locked=true { spawn-sh "playerctl next"; }

    // ===== 亮度控制（brightnessctl） =====
    // XF86MonBrightnessUp allow-when-locked=true { spawn "brightnessctl" "--class=backlight" "set" "+10%"; }
    // XF86MonBrightnessDown allow-when-locked=true { spawn "brightnessctl" "--class=backlight" "set" "10%-"; }

    // ===== 概览（Overview）切换 =====
    Super+Up repeat=false { toggle-overview; }

    // ===== 窗口与列的基本操作 =====
    Super+Q repeat=false { close-window; }   // 关闭窗口

    // 方向导航（方向键）
    Ctrl+Left  { focus-column-left; }
    Ctrl+Down  { focus-window-down; }
    Ctrl+Up    { focus-window-up; }
    Ctrl+Right { focus-column-right; }

    // 移动列或窗口
    Ctrl+Alt+Left  { move-column-left; }
    Ctrl+Alt+Down  { move-window-down; }
    Ctrl+Alt+Up    { move-window-up; }
    Ctrl+Alt+Right { move-column-right; }

    // 替代命令：到达列首/尾时跨工作区移动
    // Super+J     { focus-window-or-workspace-down; }
    // Super+K     { focus-window-or-workspace-up; }
    // Super+Ctrl+J     { move-window-down-or-to-workspace-down; }
    // Super+Ctrl+K     { move-window-up-or-to-workspace-up; }

    // 跳转至列首/尾
    //Super+Home { focus-column-first; }
    //Super+End  { focus-column-last; }
    //Super+Ctrl+Home { move-column-to-first; }
    //Super+Ctrl+End  { move-column-to-last; }

    // ===== 工作区操作 =====
    //Ctrl+Right          { focus-workspace-down; }
    //Ctrl+Left        	{ focus-workspace-up; }
    //Super+Ctrl+Page_Down { move-column-to-workspace-down; }
    //Super+Ctrl+Page_Up   { move-column-to-workspace-up; }

    // 也可只移动单个窗口：
    // Super+Ctrl+Page_Down { move-window-to-workspace-down; }

    //Super+Page_Down { move-workspace-down; }
    //Super+Page_Up   { move-workspace-up; }
  

    // ===== 鼠标滚轮绑定（受自然滚动影响） =====
    // cooldown-ms 限制触发频率，避免过快切换
    Super+WheelScrollDown      cooldown-ms=150 { focus-workspace-down; }
    Super+WheelScrollUp        cooldown-ms=150 { focus-workspace-up; }
    //Super+Ctrl+WheelScrollDown cooldown-ms=150 { move-column-to-workspace-down; }
    //Super+Ctrl+WheelScrollUp   cooldown-ms=150 { move-column-to-workspace-up; }

    //Super+Ctrl+WheelScrollRight { move-column-right; }
    //Super+Ctrl+WheelScrollLeft  { move-column-left; }

    // Shift+滚轮通常对应水平滚动，此处映射为列操作
    Ctrl+WheelScrollDown      { focus-column-right; }
    Ctrl+WheelScrollUp        { focus-column-left; }
    //Super+Ctrl+Shift+WheelScrollDown { move-column-right; }
    //Super+Ctrl+Shift+WheelScrollUp   { move-column-left; }


    // ===== 数字键切换工作区 =====
    // 动态工作区：若索引大于当前工作区数量，则指向最底部（空）工作区
    Super+1 { focus-workspace 1; }
    Super+2 { focus-workspace 2; }
    Super+3 { focus-workspace 3; }
    Super+4 { focus-workspace 4; }
    Super+5 { focus-workspace 5; }
    Super+6 { focus-workspace 6; }
    Super+7 { focus-workspace 7; }
    Super+8 { focus-workspace 8; }
    Super+9 { focus-workspace 9; }
    //Super+Shift+1 { move-column-to-workspace 1; }
    //Super+Shift+2 { move-column-to-workspace 2; }
    //Super+Shift+3 { move-column-to-workspace 3; }
    //Super+Shift+4 { move-column-to-workspace 4; }
    //Super+Shift+5 { move-column-to-workspace 5; }
    //Super+Shift+6 { move-column-to-workspace 6; }
    //Super+Shift+7 { move-column-to-workspace 7; }
    //Super+Shift+8 { move-column-to-workspace 8; }
    //Super+Shift+9 { move-column-to-workspace 9; }

    // 也可用 Super+Ctrl+N 将单个窗口移至工作区 N
    // Super+Ctrl+1 { move-window-to-workspace 1; }

    // 切换至上一个工作区
    Super+Tab { focus-workspace-previous; }

    // ===== 窗口在列内外的移动 =====
    // 若窗口单独在一列，则将其移入相邻列；若已在列内，则移出为独立列
    //Super+BracketLeft  { consume-or-expel-window-left; }
    //Super+BracketRight { consume-or-expel-window-right; }

    // 从右侧列取一个窗口放入当前列底部
    //Super+Comma  { consume-window-into-column; }
    // 将当前列底部窗口移出到右侧
    //Super+Shift+Period { expel-window-from-column; }

    // ===== 列宽与窗口高度调整 =====
    Super+R { switch-preset-column-width; }          // 切换列宽预设
    // Super+R { switch-preset-column-width-back; }  // 反向切换
    Super+Shift+R { switch-preset-window-height; }   // 切换窗口高度预设
    Super+Ctrl+R { reset-window-height; }            // 重置窗口高度
    Super+F { maximize-column; }                     // 最大化列（占满可用宽度）
    Super+Shift+F { fullscreen-window; }             // 全屏窗口

    // 将列扩展至剩余可用空间（填满剩余宽度）
    Super+Ctrl+F { expand-column-to-available-width; }

    Super+C { center-column; }                       // 居中当前列
    Super+Ctrl+C { center-visible-columns; }         // 居中所有可见列

    // 精细调整列宽（逻辑像素或百分比）
    // 支持：set-column-width "1000"（像素），"-5"或"+5"（增减），"25%"（百分比），"-10%"或"+10%"
    //Super+Minus { set-column-width "-10%"; }
    //Super+Equal { set-column-width "+10%"; }

    // 精细调整窗口高度（当列中有多个窗口时）
    //Super+Shift+Minus { set-window-height "-10%"; }
    //Super+Shift+Equal { set-window-height "+10%"; }

    // ===== 浮动窗口切换 =====
    //Super+V       { toggle-window-floating; }                       // 切换当前窗口浮动/平铺
    //Super+Shift+V { switch-focus-between-floating-and-tiling; }     // 在浮动和平铺窗口间切换焦点

    // 切换列标签显示模式（窗口以标签页形式竖直排列）
    //Super+W { toggle-column-tabbed-display; }

    // ===== 键盘布局切换 =====
    // 注意：若启用此绑定，请确保 xkb options 中没有冲突的布局切换快捷键，
    // 否则会一次切换两次。
    // Super+Space       { switch-layout "next"; }
    // Super+Shift+Space { switch-layout "prev"; }

    // ===== 截图 =====
    Print { screenshot; }                // 全屏截图
    Ctrl+Print { screenshot-screen; }    // 当前屏幕截图
    Alt+Print { screenshot-window; }     // 当前窗口截图

    // ===== 键盘快捷键抑制剂 =====
    // 某些应用（远程桌面、KVM 切换等）可能请求 niri 停止处理快捷键，
    Super+Escape allow-inhibiting=false { toggle-keyboard-shortcuts-inhibit; }

    // ===== 退出与关机 =====
    Ctrl+Alt+E { quit; }      // 也可使用 Ctrl+Alt+Delete

    
}
